name: Deploy AI-Agentic-Terminal-Portfolio (Cloudflare Pages - Account 1)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint & Type Check
        run: |
          npm run lint --if-present || true
          npx tsc --noEmit || true

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Cloudflare Pages (Account 1)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Production
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-agentic-terminal-portfolio
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "✅ Successfully deployed AI-Agentic-Terminal-Portfolio to Cloudflare Pages (Account 1)"
          echo "Project: ai-agentic-terminal-portfolio"
          echo "Commit: ${{ github.sha }}"
          echo "Live URL: https://ai-agentic-terminal-portfolio.pages.dev"