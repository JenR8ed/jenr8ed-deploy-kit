name: jenr8ed-live-ui Deploy (Cloudflare Pages)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type Check
        run: npx tsc --noEmit || echo "No TypeScript config"

      - name: Build
        run: npm run build

  deploy-preview:
    name: Deploy Preview (PRs)
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Preview
        run: npm run build

      - name: Deploy Preview to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: jenr8ed-live-ui
          directory: dist          # Change to 'build' if your output dir is different
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy Production (main branch)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Production
        run: npm run build

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: jenr8ed-live-ui
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Update JAIOS Command Center (Notion)
        run: |
          echo "✅ Production deployment successful for jenr8ed.live UI"
          echo "Repo: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          # TODO: Replace with real Notion sync from jenr8ed-deploy-kit/notion/
          # node ../../notion/sync-deployment.js --project="jenr8ed-live-ui" --status="Live"

      - name: Deployment Summary
        run: |
          echo "🎉 jenr8ed.live UI successfully deployed to Cloudflare Pages"
          echo "Live URL: https://jenr8ed.live (or jenr8ed-live-ui.pages.dev)"